<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break Time — Invoice & Quotation</title>

<!-- PWA: manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C0392B">

<!-- PWA: iOS support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BT Invoice">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
  .app { max-width: 750px; margin: 0 auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { padding: 9px 24px; border: 1.5px solid #C0392B; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; background: #fff; color: #C0392B; }
  .tab.active { background: #C0392B; color: #fff; }
  .invoice { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.10); }
  .inv-header { background: #C0392B; padding: 16px 24px; display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 16px; }
  .inv-logo { flex: 0 0 auto; display: flex; align-items: center; margin-top: -25px; }
  .inv-logo img { height: 62px; width: auto; display: block; }
  .doc-type-banner { background: #fff; padding: 0 24px 0; text-align: center; margin-top: -8px; }
  .inv-type { color: #C0392B; font-size: 20px; font-weight: 700; letter-spacing: 1px; text-align: center; }
  .inv-addr { flex: 0 0 auto; color: #fff; text-align: right; font-size: 11px; line-height: 1.8; }
  .inv-meta { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .meta-row { display: flex; gap: 8px; align-items: center; }
  .meta-label { font-size: 11px; font-weight: 700; color: #555; white-space: nowrap; }
  .meta-input { background: transparent; border: none; border-bottom: 1px solid #bbb; color: #111; font-size: 11px; width: 140px; text-align: right; outline: none; padding: 2px 2px; }
  .meta-input::placeholder { color: #aaa; }
  .inv-body { padding: 18px 24px; background: #fff; }
  .bill-label { font-size: 11px; font-weight: 700; color: #C0392B; margin-bottom: 6px; letter-spacing: 1px; }
  .bill-fields { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px; }
  .field-group { display: flex; flex-direction: column; gap: 3px; }
  .field-group label { font-size: 10px; font-weight: 700; color: #888; }
  .field-group input { border: none; border-bottom: 1px solid #ddd; font-size: 13px; padding: 4px 0; outline: none; color: #111; background: transparent; }
  .field-group input:focus { border-bottom-color: #C0392B; }
  table.items { width: 100%; border-collapse: collapse; }
  table.items th { background: #C0392B; color: #fff; font-size: 11px; padding: 8px 8px; font-weight: 700; }
  table.items th:nth-child(n+2) { text-align: right; }
  table.items th:first-child { text-align: left; }
  table.items td { padding: 6px 8px; font-size: 12px; border-bottom: none; color: #111; }
  table.items tr:last-child td { border-bottom: 1px solid #ccc; }
  table.items tr:nth-child(even) td { background: #fafafa; }
  .iinput { border: none; outline: none; font-size: 12px; width: 100%; background: transparent; color: #111; }
  .iinput.r { text-align: right; }
  .iinput::placeholder { color: #ccc; }
  .del-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; line-height: 1; font-weight: 700; padding: 0 4px; }
  .del-btn:hover { color: #C0392B; }
  .add-btn { margin-top: 10px; padding: 7px 16px; border: 2px dashed #C0392B; background: transparent; color: #C0392B; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .add-btn:hover { background: #fdf0ef; }
  .bottom-section { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 18px; gap: 16px; }
  .notes-box { flex: 1; }
  .notes-label { font-size: 11px; font-weight: 700; color: #C0392B; margin-bottom: 5px; }
  .notes-text { font-size: 11px; color: #111; line-height: 1.7; background: #f7f7f7; padding: 10px 12px; border-radius: 6px; }
  .totals-wrap { min-width: 270px; }
  table.totals { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.totals td { padding: 5px 8px; color: #111; }
  table.totals td:last-child { text-align: right; font-weight: 500; min-width: 100px; }
  table.totals .trow td { font-weight: 700; font-size: 14px; border-top: 1px solid #ddd; }
  table.totals .drow td { background: #C0392B; color: #fff; font-weight: 700; font-size: 14px; }
  table.totals .drow td:first-child { border-radius: 6px 0 0 6px; padding-left: 10px; }
  table.totals .drow td:last-child { border-radius: 0 6px 6px 0; padding-right: 10px; }
  .num-input { border: none; border-bottom: 1px solid #ddd; font-size: 13px; width: 90px; text-align: right; outline: none; color: #111; background: transparent; padding: 2px 0; }
  .inv-footer { background: #C0392B; padding: 11px 24px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.92); font-style: italic; }
  .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .print-btn { padding: 10px 24px; background: #C0392B; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .clear-btn { padding: 10px 24px; background: #fff; color: #C0392B; border: 2px solid #C0392B; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; }

  .signature-section { display: flex; justify-content: flex-start; padding: 18px 24px 10px; }
  .signature-box { text-align: center; }
  .signature-line { width: 200px; border-top: 1px solid #333; margin-bottom: 4px; }
  .signature-label { font-size: 11px; color: #555; }
  .inv-footer-wrap { margin-top: auto; }

  @media print {
    @page { size: A4; margin: 10mm; }
    body { background: #fff; padding: 0; }
    .actions, .tabs, .add-btn, .del-btn, .toggle-cb { display: none !important; }
    .invoice {
      box-shadow: none;
      border-radius: 0;
      height: 277mm;
      display: flex;
      flex-direction: column;
    }
    .inv-body { padding: 18px 24px; }
    .app { max-width: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    .inv-addr { color: #111 !important; }
    .meta-label { color: #111 !important; }
    .meta-input { color: #111 !important; border-bottom-color: rgba(0,0,0,0.4) !important; }
    .inv-type { color: #111 !important; }
    table.items th { color: #111 !important; }
    table.items td { border-bottom: none !important; }
    table.items tr:last-child td { border-bottom: 1px solid #bbb !important; }
    table.items tr:nth-child(even) td { background: transparent !important; }
    .inv-footer-wrap { position: static; margin-top: auto; }
  }
</style>
</head>
